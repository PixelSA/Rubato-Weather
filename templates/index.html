<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Beats</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div id="root"></div>

<script>
const { useState } = React;

function WeatherApp() {
    const [weather, setWeather] = useState('');
    const [temperature, setTemperature] = useState('');
    const [songTitle, setSongTitle] = useState('');
    const [artist, setArtist] = useState('');
    const [albumArt, setAlbumArt] = useState('');
    const [previewUrl, setPreviewUrl] = useState('');
    const [spotifyUrl, setSpotifyUrl] = useState('');
    const [loading, setLoading] = useState(false);
    const [backgroundClass, setBackgroundClass] = useState('clear-day');
    const [accentColor] = useState('#1DB954');
    const [moodText, setMoodText] = useState('');
    const [isRaining, setIsRaining] = useState(false);

    const getWeatherMood = (weatherText) => {
        const condition = weatherText.toLowerCase();
        console.log(condition);

        if (condition.includes("rain") || condition.includes("drizzle") || condition.includes("mist"))
            return { icon: "🌧️", mood: "Reflective & atmospheric" };

        if (condition.includes("storm") || condition.includes("thunder"))
            return { icon: "⛈️", mood: "Powerful & dramatic" };

        if (condition.includes("snow"))
            return { icon: "❄️", mood: "Cozy & peaceful" };

        if (condition.includes("cloud"))
            return { icon: "☁️", mood: "Dreamy & relaxed" };

        return { icon: "☀️", mood: "Bright & energetic" };
    };

    const getWeatherBackgroundClass = (weatherText, isDay) => {
        const condition = weatherText.toLowerCase();
        if (condition.includes('rain') || condition.includes('drizzle') || condition.includes('mist')) {
            return isDay ? 'rainy-day' : 'rainy-night';
        } else if (condition.includes('thunder') || condition.includes('storm')) {
            return 'stormy';
        } else if (condition.includes('snow') || condition.includes('sleet')) {
            return 'snowy';
        } else if (condition.includes('cloud') || condition.includes('overcast')) {
            return isDay ? 'cloudy-day' : 'cloudy-night';
        } else if (condition.includes('sunny') || condition.includes('clear')) {
            return isDay ? 'clear-day' : 'clear-night';
        }
        return isDay ? 'clear-day' : 'clear-night';
    };

    const getLocationAndData = () => {
        setLoading(true);

        navigator.geolocation.getCurrentPosition(
            (position) => {
                fetch(`/api/get-weather-music?lat=${position.coords.latitude}&lon=${position.coords.longitude}`)
                    .then(res => res.json())
                    .then(data => {
                        setWeather(data.weather);
                        setTemperature(data.temperature);
                        setSongTitle(data.song_title);
                        setArtist(data.artist);
                        setAlbumArt(data.album_art);
                        setPreviewUrl(data.preview_url);
                        setSpotifyUrl(data.spotify_url);

                        const mood = getWeatherMood(data.weather);
                        setMoodText(mood.mood);
                        
                        // Check if it's raining
                        const isRainingCondition = data.weather.toLowerCase().includes('rain') || 
                                                   data.weather.toLowerCase().includes('drizzle');
                        setIsRaining(isRainingCondition);

                        setBackgroundClass(getWeatherBackgroundClass(data.weather, data.is_day));
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            },
            () => setLoading(false)
        );
    };

    return React.createElement(
        'div',
        { className: `app-container ${backgroundClass}` },

        // Rain animation overlay
        isRaining && React.createElement('div', { className: 'rain-container' },
            Array.from({ length: 50 }).map((_, i) =>
                React.createElement('div', {
                    key: i,
                    className: 'rain-drop',
                    style: {
                        left: `${Math.random() * 100}%`,
                        animationDelay: `${Math.random() * 0.5}s`,
                        animationDuration: `${0.5 + Math.random() * 0.3}s`
                    }
                })
            )
        ),

        React.createElement(
            'div',
            { className: 'content' },

            React.createElement('h1', null, 'Rubato Weather'),
            React.createElement('p', null, 'Discover music that resonates with your surroundings'),

            React.createElement(
                'button',
                { className: 'btn-primary', onClick: getLocationAndData, disabled: loading },
                loading ? 'Analyzing Sky & Tracks...' : 'Sync Environment & Audio'
            ),

            weather && React.createElement(
                'div',
                {
                    className: 'weather-card animate-card',
                    style: { '--accent': accentColor }
                },

                React.createElement(
                    'h2',
                    { className: 'weather-condition' },
                    `${getWeatherMood(weather).icon} ${weather}`
                ),

                React.createElement('p', null, `Temperature: ${temperature}°C`),

                songTitle && React.createElement(
                    'div',
                    { className: 'music-recommendation' },

                    albumArt && React.createElement('img', {
                        src: albumArt,
                        className: 'album-cover',
                        style: {
                            width: '240px',
                            height: '240px',
                            borderRadius: '20px',
                            boxShadow: `0 20px 50px ${accentColor}`,
                            transition: '0.4s ease'
                        }
                    }),

                    React.createElement('h3', null, songTitle),
                    React.createElement('p', null, `by ${artist}`),

                    previewUrl
                        ? React.createElement('audio', { src: previewUrl, controls: true })
                        : React.createElement('p', null, 'Audio preview unavailable.'),

                    React.createElement(
                        'a',
                        {
                            href: spotifyUrl,
                            target: '_blank',
                            rel: 'noopener noreferrer',
                            className: 'spotify-link'
                        },
                        'Open in Spotify'
                    )
                )
            ),

            !weather && !loading && React.createElement(
                'div',
                { className: 'welcome-message' },
                React.createElement('h2', null, '🎵 Music changes with weather'),
                React.createElement('p', null, 'Enable location to discover your soundtrack.')
            )
        )
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(WeatherApp));
</script>
</body>
</html>
